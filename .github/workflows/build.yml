name: Build Zygisk Module

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        
    - name: Build Module
      run: |
        export ANDROID_NDK_HOME=${ANDROID_NDK_ROOT}
        mkdir -p build
        cd build
        cmake -DCMAKE_TOOLCHAIN_FILE=${ANDROID_NDK_HOME}/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_PLATFORM=android-21 ../src
        make
        cd ..
        
        # Package ZIP
        mkdir -p pkg/zygisk/arm64-v8a
        cp module/module.prop pkg/
        cp module/customize.sh pkg/
        cp build/libzygisk_loader_bypass.so pkg/zygisk/arm64-v8a/
        cd pkg
        zip -r ../Zygisk-Loader-Bypass.zip .
        
    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: Zygisk-Loader-Bypass
        path: Zygisk-Loader-Bypass.zip
